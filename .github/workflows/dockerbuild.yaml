name: WMS CI/CD

on:
  push:
    branches: ["master"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"

      - name: Install Frontend Dependencies & Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push API
        run: |
          docker build -t akodevv/wms-api:${{ github.sha }} ./api
          docker tag akodevv/wms-api:${{ github.sha }} akodevv/wms-api:latest
          docker push akodevv/wms-api:${{ github.sha }}
          docker push akodevv/wms-api:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl start nginx 2>/dev/null || true
            sudo systemctl enable nginx 2>/dev/null || true
            
            if [ ! -d "/home/ec2-user/WMS-Docker" ]; then
              git clone https://github.com/Ako0010/WMS-Docker.git /home/ec2-user/WMS-Docker
            fi
            cd /home/ec2-user/WMS-Docker
            
            git fetch --all
            git reset --hard origin/master

            docker compose pull api
            docker compose down
            docker compose up -d --force-recreate
            docker image prune -f

            sudo rm -rf /usr/share/nginx/html/*

      - name: Copy built files to EC2 Nginx
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/tmp"
          strip_components: 2

      - name: Finalize Nginx Files
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo cp -r /tmp/frontend/dist/* /usr/share/nginx/html/
            sudo rm -rf /tmp/frontend
            sudo systemctl restart nginx