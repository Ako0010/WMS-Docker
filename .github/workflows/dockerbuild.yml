name: WMS CI/CD

on:
  push:
    branches: ["master"]

  workflow_dispatch:

jobs:
  test:
    if: github.event_name == 'push'
    strategy:
      matrix:
        node-version: ["24.15.0"]
        os: [ubuntu-latest]
    
    runs-on: ${{matrix.os}}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Install Node.js ${{matrix.node-version}}
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node-version}}

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install


  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: API image build and push to docker-hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/wms-api ./api
          docker push ${{ secrets.DOCKER_USERNAME }}/wms-api


      - name: Frontend image build and push to docker-hub
        run: | 
          docker build -t ${{ secrets.DOCKER_USERNAME }}/wms-frontend ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/wms-frontend

        

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22

          script: |
            if [ ! -d "WMS-Docker/.git" ]; then
            git clone https://github.com/Ako0010/WMS-Docker.git
            fi

            cd WMS-Docker
            git pull origin main
            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f