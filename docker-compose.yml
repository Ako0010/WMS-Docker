version: "3.9"

services:
  frontend:
    image: ${DOCKER_USERNAME}/wms-frontend:latest
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - api
    networks:
      - wms-network

  api:
    image: ${DOCKER_USERNAME}/wms-api:latest
    ports:
      - "8080:8080"
    restart: always
    environment:
    - ASPNETCORE_ENVIRONMENT=Development
    - ConnectionStrings__DefaultConnectionString=Server=mssql,1433;Database=WarehouseManagementSystemDb;User Id=sa;Password=DBPassword123!;Encrypt=False;TrustServerCertificate=True

    depends_on:
      - mssql
    networks:
      - wms-network

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "DBPassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - wms-network

volumes:
  mssql_data:

networks:
  wms-network:
    driver: bridge