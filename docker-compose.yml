version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  api:
    build: ./api
    ports:
      - "5075:5075"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnectionString=Server=mssql;Database=WarehouseManagementSystem;User=sa;Password=StrongP@ass1234;Encrypt=False;TrustServerCertificate=True

    depends_on:
      - mssql

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "StrongP@ass1234"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"